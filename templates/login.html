<!DOCTYPE html>
<html>
<head>
    <title>Login - Student Management System</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:linear-gradient(135deg,#1e3c72,#2a5298);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            width:380px;
            background:white;
            padding:35px;
            border-radius:12px;
            box-shadow:0 10px 25px rgba(0,0,0,0.3);
        }

        h2{
            text-align:center;
            color:#1e3c72;
            margin-bottom:10px;
        }

        .title{
            text-align:center;
            color:#666;
            margin-bottom:20px;
            font-size:14px;
        }

        input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:6px;
            font-size:15px;
            margin-bottom:15px;
        }

        input:focus{
            outline:none;
            border-color:#1e3c72;
        }

        .password-box{
            position:relative;
        }

        .password-box input{
            margin-bottom:15px;
            padding-right:45px;
        }

        .toggle{
            position:absolute;
            right:15px;
            top:35%;
            transform:translateY(-50%);
            cursor:pointer;
            font-size:18px;
            user-select:none;
        }

        button{
            width:100%;
            padding:12px;
            background:#1e3c72;
            color:white;
            border:none;
            border-radius:6px;
            font-size:16px;
            cursor:pointer;
            transition:.3s;
        }

        button:hover{
            background:#16335c;
        }

        p{
            text-align:center;
            margin-top:18px;
        }

        a{
            color:#1e3c72;
            text-decoration:none;
            font-weight:bold;
        }

        a:hover{
            text-decoration:underline;
        }

    </style>

</head>

<body>

<div class="container">

<h2>Welcome Back</h2>

<p class="title">Student Management System</p>

<form method="POST">

<input type="text" name="username" placeholder="Enter Username" required>

<div class="password-box">

<input type="password" id="password" name="password" placeholder="Enter Password" required>

<span class="toggle" onclick="togglePassword()">👁️</span>

</div>

<button type="submit">Login</button>

</form>

<p>
Don't have an account?
<a href="/register">Register</a>
</p>

</div>

<script>

function togglePassword(){

    var x=document.getElementById("password");

    if(x.type==="password"){
        x.type="text";
    }
    else{
        x.type="password";
    }

}

</script>

</body>
</html>
