<!DOCTYPE html>
<html>
<head>
<title>Student Management System</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f7fc;
padding:30px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
background:#1e3c72;
color:white;
padding:20px;
border-radius:10px;
margin-bottom:25px;
}

.header h1{
font-size:28px;
}

.user{
font-size:18px;
font-weight:bold;
}

.logout{
background:#dc3545;
color:white;
padding:10px 18px;
text-decoration:none;
border-radius:6px;
font-weight:bold;
}

.logout:hover{
background:#b52a37;
}

.container{
display:flex;
gap:25px;
flex-wrap:wrap;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 12px rgba(0,0,0,.15);
}

.form-card{
width:360px;
}

.table-card{
flex:1;
min-width:500px;
}

.card h2{
margin-bottom:20px;
color:#1e3c72;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
font-size:15px;
}

input:focus{
outline:none;
border-color:#1e3c72;
}

button{
width:100%;
padding:12px;
background:#1e3c72;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#16335c;
}

.search-box{
display:flex;
gap:10px;
margin-bottom:20px;
}

.search-box input{
margin:0;
}

.search-box button{
width:150px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#1e3c72;
color:white;
padding:12px;
}

td{
padding:12px;
text-align:center;
border-bottom:1px solid #ddd;
}

.edit{
color:#0d6efd;
font-weight:bold;
text-decoration:none;
}

.delete{
color:red;
font-weight:bold;
text-decoration:none;
}

tr:hover{
background:#f1f5ff;
}

</style>

</head>

<body>

<div class="header">

<div>
<h1>Student Management System</h1>
<div class="user">
Welcome, {{ username }}
</div>
</div>

<a href="/logout" class="logout">Logout</a>

</div>

<div class="container">

<div class="card form-card">

<h2>Add Student</h2>

<form method="POST">

<input type="text" name="name" placeholder="Enter Student Name" required>

<input type="text" name="rollno" placeholder="Enter Roll Number" required>

<input type="text" name="course" placeholder="Enter Course" required>

<button type="submit">Add Student</button>

</form>

</div>

<div class="card table-card">
<h2>Student List</h2>

<form method="GET" class="search-box">

<input type="text"
name="search"
placeholder="Search by Name or Roll No">

<button type="submit">Search</button>

</form>

<table>

<tr>
<th>ID</th>
<th>Name</th>
<th>Roll No</th>
<th>Course</th>
<th>Action</th>
</tr>

{% for student in students %}

<tr>

<td>{{ student[0] }}</td>
<td>{{ student[1] }}</td>
<td>{{ student[2] }}</td>
<td>{{ student[3] }}</td>

<td>

<a class="edit"
href="/edit/{{ student[0] }}">
✏ Edit
</a>

|

<a class="delete"
href="/delete/{{ student[0] }}"
onclick="return confirm('Are you sure you want to delete this student?')">
🗑 Delete
</a>

</td>

</tr>

{% endfor %}

</table>

</div>

</div>

</body>
</html>
