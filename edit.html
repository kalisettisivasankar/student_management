<!DOCTYPE html>
<html>
<head>

<title>Edit Student</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f7fc;
padding:30px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
background:#1e3c72;
color:white;
padding:20px;
border-radius:10px;
margin-bottom:25px;
}

.header h1{
font-size:28px;
}

.back{
background:#dc3545;
color:white;
padding:10px 18px;
text-decoration:none;
border-radius:6px;
font-weight:bold;
}

.back:hover{
background:#b52a37;
}

.card{
width:420px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 12px rgba(0,0,0,.15);
}

.card h2{
text-align:center;
margin-bottom:20px;
color:#1e3c72;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
font-size:15px;
}

input:focus{
outline:none;
border-color:#1e3c72;
}

button{
width:100%;
padding:12px;
background:#1e3c72;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#16335c;
}

</style>

</head>

<body>

<div class="header">

<h1>Edit Student</h1>

<a href="/" class="back">⬅ Back</a>

</div>

<div class="card">

<h2>Update Student Details</h2>

<form method="POST">

<input
type="text"
name="name"
value="{{ student[1] }}"
required>

<input
type="text"
name="rollno"
value="{{ student[2] }}"
required>

<input
type="text"
name="course"
value="{{ student[3] }}"
required>
<button type="submit">Update Student</button>

</form>

</div>

</body>
</html>
